{% extends 'base.html' %}

{% block title %}Post Saved! | Instagram CMS{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow-sm p-5">
                <div class="card-body">
                    <div class="mb-3" style="font-size: 4rem;">✅</div>
                    <h2 class="fw-bold mb-3">Post Saved!</h2>
                    <p class="text-muted">Your post has been added to the CMS. You can view it in the posts list.</p>
                    <div class="mt-4">
                        <a href="/add-post" class="btn btn-primary me-2">➕ Add Another Post</a>
                        <a href="/posts" class="btn btn-outline-secondary">📋 View All Posts</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- success toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 999">
    <div id="successToast" class="toast" role="alert" aria-live="assertive">
        <div class="toast-header bg-success text-white">
            <strong class="me-auto">✅ Success</strong>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
        </div>
        <div class="toast-body">
            Post added successfully!
        </div>
    </div>
</div>
{% endblock %}
