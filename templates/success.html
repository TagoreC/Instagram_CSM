{% extends 'base.html' %}
{% block title %}Saved | InstaCMS{% endblock %}

{% block content %}
<div class="page-wrap text-center" style="max-width:400px;">
    <p style="font-size:2.5rem;">✓</p>
    <h4 class="mb-1">Post saved</h4>
    <p class="text-muted small mb-4">Your post has been added to the CMS.</p>
    <div class="d-flex gap-2 justify-content-center">
        <a href="/add-post" class="btn btn-primary btn-sm">Add Another</a>
        <a href="/posts" class="btn btn-outline-secondary btn-sm">View Posts</a>
    </div>
</div>

<!-- toast -->
<div class="position-fixed bottom-0 end-0 p-3">
    <div id="successToast" class="toast" role="alert">
        <div class="toast-header">
            <strong class="me-auto small">Saved</strong>
            <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="toast"></button>
        </div>
        <div class="toast-body small">Post added successfully.</div>
    </div>
</div>
{% endblock %}
