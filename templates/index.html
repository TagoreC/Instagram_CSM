{% extends 'base.html' %}
{% block title %}Dashboard | InstaCMS{% endblock %}

{% block content %}
<div class="page-wrap">
    <p class="page-title">Dashboard</p>

    <!-- stat row -->
    <div class="stat-row">
        <div class="stat-box">
            <div class="num">{{ total }}</div>
            <div class="lbl">Total Posts</div>
        </div>
        <div class="stat-box">
            <div class="num">{{ scheduled }}</div>
            <div class="lbl">Scheduled</div>
        </div>
        <div class="stat-box">
            <div class="num">{{ published }}</div>
            <div class="lbl">Published</div>
        </div>
        <div class="stat-box">
            <div class="num">{{ drafts }}</div>
            <div class="lbl">Drafts</div>
        </div>
        <div class="stat-box">
            <div class="num">{{ followers }}</div>
            <div class="lbl">Followers</div>
        </div>
    </div>

    <div class="d-flex gap-2">
        <a href="/add-post" class="btn btn-primary btn-sm">New Post</a>
        <a href="/posts" class="btn btn-outline-secondary btn-sm">All Posts</a>
        <a href="/analytics" class="btn btn-outline-secondary btn-sm">Analytics</a>
    </div>
</div>
{% endblock %}
