{% extends 'base.html' %}
{% block title %}Log Snapshot | InstaCMS{% endblock %}

{% block content %}
<div class="page-wrap">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="d-flex align-items-center gap-3 mb-4">
                <a href="/analytics" class="btn btn-outline-secondary btn-sm">← Back</a>
                <p class="page-title mb-0">Log Snapshot</p>
            </div>

            <form id="addForm" method="POST" action="/add-analytics">
                <div class="mb-3">
                    <label for="followers" class="form-label small">Followers *</label>
                    <input type="number" class="form-control form-control-sm" id="followers" name="followers" min="0">
                    <span class="error-msg"></span>
                </div>
                <div class="mb-3">
                    <label for="following" class="form-label small">Following *</label>
                    <input type="number" class="form-control form-control-sm" id="following" name="following" min="0">
                    <span class="error-msg"></span>
                </div>
                <div class="mb-3">
                    <label for="total_posts" class="form-label small">Total Posts *</label>
                    <input type="number" class="form-control form-control-sm" id="total_posts" name="total_posts" min="0">
                    <span class="error-msg"></span>
                </div>
                <div class="mb-3">
                    <label for="avg_likes" class="form-label small">Avg Likes</label>
                    <input type="number" class="form-control form-control-sm" id="avg_likes" name="avg_likes" step="0.01" min="0">
                </div>
                <div class="mb-4">
                    <label for="avg_reach" class="form-label small">Avg Reach</label>
                    <input type="number" class="form-control form-control-sm" id="avg_reach" name="avg_reach" step="0.01" min="0">
                </div>
                <button type="submit" class="btn btn-primary btn-sm">Save</button>
                <a href="/analytics" class="btn btn-link btn-sm text-muted">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
