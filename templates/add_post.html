{% extends 'base.html' %}

{% block title %}Add Post | Instagram CMS{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2 class="mb-4">📝 Add New Post</h2>

            <!-- main form -->
            <form id="addForm" method="POST" action="/add-post">

                <div class="mb-3">
                    <label for="username" class="form-label">Instagram Username <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="e.g. @travel_photos">
                    <span class="error-msg"></span>
                </div>

                <div class="mb-3">
                    <label for="caption" class="form-label">Caption <span class="text-danger">*</span></label>
                    <textarea class="form-control" id="caption" name="caption" rows="4" maxlength="2200" placeholder="Write your caption here..."></textarea>
                    <span class="error-msg"></span>
                </div>

                <div class="mb-3">
                    <label for="image_url" class="form-label">Image URL <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="image_url" name="image_url" placeholder="https://example.com/photo.jpg">
                    <span class="error-msg"></span>
                </div>

                <div class="mb-3">
                    <label for="status" class="form-label">Status</label>
                    <select class="form-select" id="status" name="status">
                        <option value="draft">Draft</option>
                        <option value="scheduled">Scheduled</option>
                        <option value="published">Published</option>
                    </select>
                    <span class="error-msg"></span>
                </div>

                <div class="mb-3" id="scheduledDateGroup" style="display:none;">
                    <label for="scheduled_at" class="form-label">Scheduled Date <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="scheduled_at" name="scheduled_at">
                    <span class="error-msg"></span>
                </div>

                <div class="mb-3">
                    <label for="likes" class="form-label">Estimated Likes</label>
                    <input type="number" class="form-control" id="likes" name="likes" min="0" placeholder="0">
                    <span class="error-msg"></span>
                </div>

                <div class="mb-3">
                    <label for="hashtags" class="form-label">Hashtags <small class="text-muted">(comma-separated)</small></label>
                    <input type="text" class="form-control" id="hashtags" name="hashtags" placeholder="#travel, #photography, #nature">
                    <span class="error-msg"></span>
                </div>

                <button type="submit" class="btn btn-primary px-4">💾 Save Post</button>
                <a href="/posts" class="btn btn-outline-secondary ms-2">Cancel</a>

            </form>
        </div>
    </div>
</div>
{% endblock %}
